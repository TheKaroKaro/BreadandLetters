    - label: "Ticket Deflection"
      value: "30%"
    - label: "Status"
      value: "UAT Phase"
  year: "2026"
  technologies: ["AWS", "Chatbot", "Cloud Computing"]

- title: "eLeave & Attendance System"
  description: "Complete leave management solution for 150+ contact center agents, replacing manual spreadsheet tracking."
  categories: ["Reporting", "Contact Center Operation"]
  challenge: "Managers spent 12 hours weekly tracking leave requests via Excel and WhatsApp. Manual tracking led to scheduling conflicts, delayed approvals, and no visibility into team availability."
  solution: "Built a Power Apps leave management system with automated approval workflows, real-time calendar integration, and manager dashboards. Agents submit requests via mobile app; managers get instant notifications and can approve with one click."
  results:
    - label: "Faster Approvals"
      value: "70%"
    - label: "Monthly Time Saved"
      value: "12 hours"
    - label: "Team Coverage"
      value: "150+ agents"
  year: "2025"
  technologies: ["Power Apps", "SharePoint", "Power Automate"]

- title: "Quality Monitoring Form"
  description: "Web-based Quality Form system that automatically captures, summarizes, and identifies coaching opportunities."
  categories: ["Quality"]
  challenge: "Supervisors manually tracked quality scores using Excel-based checklist forms. They spent hours pivoting data and calculating scores, missing critical insights on coaching opportunities and team-wide trends."
  solution: "Created a web-based quality form that automates score calculation and generates weekly/monthly failure point summaries by agent. Provides supervisors with real-time insights and automatically flags coaching opportunities."
