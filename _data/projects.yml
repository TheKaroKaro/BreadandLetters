- title: "Sales Email Extraction - Commission Calculation"
  description: "Automated data collation for Sales Commission Calculation."
  categories: ["Finance"]
  challenge: "Finance staff spent 36.5 hours monthly manually copying sales details from emails into Excel. Each email had different formats and line items, making the process error-prone and time-consuming."
  solution: "Developed an intelligent RPA that automatically detects email content patterns, extracts line items, and maps them into structured Excel sheets with 100% accuracy. The bot processes emails as they arrive and updates commission sheets in real-time."
  results:
    - label: "Monthly Time Saved"
      value: "36.5 hours"
    - label: "Error Elimination"
      value: "100%"
    - label: "Processing Speed"
      value: "Real-time"
  year: "2026"
  technologies: ["RPA", "Power Automate", "Excel"]

- title: "Finance AR - Master Data Consolidation"
  description: "Automated Weekly Master Data collation and transformation using Power Query."
  categories: ["Finance", "Reporting"]
  challenge: "Finance AR teams spent 12 hours weekly manually merging disparate data sources, mapping vendor names, and generating sequential invoice numbers. Manual VLOOKUPs and copy-paste operations led to frequent errors and inconsistencies."
  solution: "Engineered a Power Query ETL (Extract, Transform, Load) pipeline that automatically consolidates multiple sources into a single 'Golden Record' sheet. Features automated vendor name mapping, date-based invoice generation, and one-click data refresh."
  results:
    - label: "Monthly Time Saved"
      value: "12 hours"
    - label: "Error Reduction"
      value: "100%"
    - label: "Process Time"
      value: "1 click"
  year: "2026"
  technologies: ["Power Query", "Excel", "ETL"]

