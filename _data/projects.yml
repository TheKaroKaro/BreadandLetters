  technologies: ["Power Apps", "Power BI", "SharePoint"]

- title: "Case Management System"
  description: "Web-based CRM that captures, tracks, and enables case assignment to relevant teams."
  categories: ["Contact Center Operation"]
  challenge: "Non-claim cases were tracked manually in Excel. When multiple teams needed involvement, cases were sent via email, creating long email trails that led to confusion and missed follow-ups."
  solution: "Built a web-based CRM that stores all cases in a central database. Features one-click case assignment, automatic reminders, and complete case history tracking. Teams can collaborate within the system instead of email chains."
  results:
    - label: "Monthly Time Saved"
      value: "6.23 hours"
    - label: "AHT Improvement"
      value: "23%"
    - label: "Case Visibility"
      value: "100%"
  year: "2024"
  technologies: ["Power Apps", "Dataverse", "Power Automate"]

- title: "Detector Chatbots - Teams Integration"
  description: "Teams-based chatbot that alerts on potential customer detractors before escalation."
  categories: ["Contact Center Operation"]
  challenge: "NPS scores were suffering because upstream teams had no visibility into sensitive customer interactions. When Level 1 agents handled irate customers, this context was lost before escalation to Level 2."
  solution: "Integrated a Teams bot into the CRM that allows Level 1 agents to flag sensitive cases with one click. The bot instantly notifies the assigned Level 2 agent with customer context, enabling better preparation and handling."
  results:
    - label: "NPS Improvement"
      value: "68 → 84 pts"
    - label: "Escalation Handling"
      value: "Proactive"
    - label: "Customer Context"
      value: "100% preserved"
  year: "2025"
  technologies: ["Teams Bot", "Power Automate", "CRM Integration"]

- title: "Customer Callback Form Automation"
  description: "Teams-based outbound call case management system."
  categories: ["Contact Center Operation"]
  challenge: "Callback requests were synced to a shared Excel file, creating sync issues, data mismatches, and manual tracking. CS agents spent significant time on administrative work, and SLAs were calculated manually with no overall case insights."
  solution: "Integrated a Teams bot with the client's website contact form. Each request creates an interactive case form in Teams with automatic timestamp capture. Minimal typing required from CS agents, reducing after-call work time."
  results:
    - label: "Monthly Time Saved"
      value: "23.4 hours"
    - label: "After-Call Work"
      value: "Reduced 70%"
    - label: "SLA Tracking"
      value: "Automated"
  year: "2025"
  technologies: ["Teams Bot", "Power Automate", "SharePoint"]